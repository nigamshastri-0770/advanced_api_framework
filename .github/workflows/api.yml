name: Microservices API Automation

on:

  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

jobs:

  api-tests:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version:
          - "3.13"

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          pytest tests \
          -n auto \
          --alluredir=reports

      - name: Generate HTML Report
        if: always()
        run: |
          pytest \
          --html=reports/report.html \
          --self-contained-html

      - name: Upload Reports
        if: always()

        uses: actions/upload-artifact@v4

        with:
          name: test-reports

          path: |
            reports/