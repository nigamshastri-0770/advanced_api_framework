version: "3.9"

services:

  postgres:

    image: postgres:15

    container_name: micro_postgres

    restart: always

    environment:

      POSTGRES_USER: api_user
      POSTGRES_PASSWORD: api_pass
      POSTGRES_DB: api

    ports:

      - "5432:5432"

    volumes:

      - pgdata:/var/lib/postgresql/data


  test-runner:

    build: .

    depends_on:

      - postgres

    environment:

      DB_HOST: postgres
      DB_NAME: api
      DB_USER: api_user
      DB_PASSWORD: api_pass

    command: pytest -v


volumes:

  pgdata: